<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">
  <!-- Icon: geometric building/diamond mark -->
  <g transform="translate(8, 10)">
    <!-- Base diamond shape - bright teal for dark bg -->
    <polygon points="35,5 60,25 35,72 10,25" fill="#27A3A3" opacity="0.9"/>
    <!-- Inner highlight -->
    <polygon points="35,18 52,29 35,58 18,29" fill="#4ECBCB" opacity="0.7"/>
    <!-- Copper accent -->
    <polygon points="35,32 48,40 35,58 22,40" fill="#C98A50" opacity="0.9"/>
    <!-- Top cap -->
    <polygon points="35,5 48,18 35,18 22,18" fill="#0D6E6E"/>
  </g>
  <!-- Wordmark: AQAR -->
  <text
    x="82"
    y="62"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    letter-spacing="-1"
    fill="#EEF5F5"
  >AQAR</text>
  <!-- Tagline -->
  <text
    x="83"
    y="80"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3"
    fill="#27A3A3"
  >REAL ESTATE</text>
  <!-- Copper accent underline -->
  <rect x="83" y="84" width="140" height="2" fill="#C98A50" rx="1"/>
</svg>
