name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: i18n parity
        run: pnpm i18n

      - name: Build
        run: pnpm build
        env:
          # Build must not depend on real secrets; pages are dynamic. A dummy
          # DB URL keeps any accidental build-time client construction happy.
          NEXT_TELEMETRY_DISABLED: "1"
